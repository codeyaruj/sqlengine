name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build and test (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Clang
        if: matrix.compiler == 'clang'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Strict warning build
        run: make clean && make

      - name: Unit tests
        run: make test

      - name: AddressSanitizer
        run: make asan

      - name: UndefinedBehaviorSanitizer
        run: make ubsan

      - name: Combined sanitizers
        run: make sanitize
